<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Plant Dashboard</title>
    <style>
        :root { --bg: #f4f6f3; --card: #fff; --text: #2c3e2a; --accent: #4a7c59; --border: #d3dcd4; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 1rem; margin: 0; }
        .dashboard { width: 100%; max-width: 800px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .dash-btn { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; }
        
        .study-view { width: 100%; max-width: 500px; display: none; flex-direction: column; }
        .flashcard-container { perspective: 1000px; height: 500px; width: 100%; position: relative; margin-top: 1rem; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; background: white; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
        .back { transform: rotateY(180deg); padding: 1.5rem; overflow-y: auto; }
        .arrow-btn { background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Ecotone Dashboard</h1>
    <div id="dash" class="dashboard">
        <div class="grid" id="dash-grid">
            <div class="dash-btn" onclick="start('all')">📚 All</div>
            <div class="dash-btn" onclick="start('shuffle')">🔀 Shuffle</div>
        </div>
    </div>

    <div id="study" class="study-view">
        <div style="display: flex; justify-content: space-between;">
            <button onclick="showDash()">← Menu</button>
            <span id="progress"></span>
        </div>
        
        <div class="flashcard-container">
            <div class="flashcard" id="card" onclick="this.classList.toggle('flipped')">
                <div class="face front">
                    <img id="photo" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="face back" id="back-content">
                    <h2 id="sci-name" style="font-style:italic; margin:0;"></h2>
                    <h3 id="common-name" style="margin:0.5rem 0;"></h3>
                    <div id="details" style="font-size: 0.9rem; line-height: 1.4;"></div>
                </div>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; margin-top:1rem;">
            <button class="arrow-btn" onclick="changeCard(-1)">❮</button>
            <button class="arrow-btn" onclick="changeCard(1)">❯</button>
        </div>
    </div>

    <script src="data/daily_data.js"></script>
    <script>
        let deck = []; let idx = 0;
        function start(mode) {
            deck = Object.keys(plantData).map(k => ({name: k, ...plantData[k]}));
            if(mode === 'shuffle') deck.sort(() => Math.random() - 0.5);
            document.getElementById('dash').style.display = 'none';
            document.getElementById('study').style.display = 'flex';
            render();
        }
        function render() {
            let p = deck[idx];
            document.getElementById('photo').src = p.photos[0]?.url || '';
            document.getElementById('sci-name').innerText = p.name;
            document.getElementById('common-name').innerText = p.common_name;
            let t = p.traits || {};
            document.getElementById('details').innerHTML = `
                <strong>Family:</strong> ${p.family}<br>
                <strong>Habit:</strong> ${t.habit || 'N/A'}<br>
                <strong>Bloom:</strong> ${t.bloom_time || 'N/A'}<br>
                <strong>Water:</strong> ${t.water_use || 'N/A'}<br>
                <strong>Light:</strong> ${t.light_requirement || 'N/A'}<br>
                <strong>Wildlife:</strong> ${t.wildlife || 'N/A'}
            `;
            document.getElementById('progress').innerText = `${idx + 1} / ${deck.length}`;
        }
        function changeCard(dir) {
            idx = Math.max(0, Math.min(deck.length - 1, idx + dir));
            document.getElementById('card').classList.remove('flipped');
            render();
        }
        function showDash() {
            document.getElementById('dash').style.display = 'block';
            document.getElementById('study').style.display = 'none';
        }
    </script>
</body>
</html>
