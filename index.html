<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecotone Native Plant Dashboard</title>
    <style>
        :root { --bg-color: #f0f4f1; --card-bg: #ffffff; --text-main: #2b3a2f; --text-muted: #5c7061; --accent-green: #3a6346; --accent-light: #e8f0ea; --border-color: #c9d6cc; --danger: #d9534f; --warning: #f59f00; }
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 1rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: var(--accent-green); margin-bottom: 2rem; font-size: 2rem; }
        .dashboard-view { width: 100%; max-width: 900px; }
        .section-title { font-size: 1.2rem; font-weight: 600; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin: 2rem 0 1rem 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .dash-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .dash-btn:hover { border-color: var(--accent-green); background: var(--accent-light); }
        .study-view { width: 100%; max-width: 550px; display: none; flex-direction: column; }
        .flashcard-container { perspective: 1000px; height: 550px; width: 100%; position: relative; margin-bottom: 1rem; }
        .flashcard { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: white; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-color); }
        .card-back { transform: rotateY(180deg); padding: 1.5rem; overflow-y: auto; background: #fafbfc; }
        .eval-controls { display: flex; gap: 0.5rem; opacity: 0; transform: translateY(10px); transition: 0.3s; pointer-events: none; }
        .eval-controls.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .eval-btn { flex: 1; padding: 1rem; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>
    <h1>Ecotone Dashboard</h1>
    <div id="dashboard-view" class="dashboard-view">
        <div class="section-title">Continue Study</div>
        <div class="grid"><div class="dash-btn" id="resume-btn" style="display:none; border-color: var(--accent-green);" onclick="resumeSession()"><span class="title">Resume Session</span><span class="subtitle" id="resume-subtitle"></span></div></div>
        
        <div class="section-title">Study Modes</div>
        <div class="grid">
            <div class="dash-btn" onclick="startStudy('smart')"><span>🧠</span><span class="title">Smart Review</span></div>
            <div class="dash-btn" onclick="startStudy('all')"><span>📚</span><span class="title">All Plants</span></div>
            <div class="dash-btn" onclick="startStudy('missed')"><span>🎯</span><span class="title">Review Missed</span></div>
            <div class="dash-btn" onclick="startStudy('exotic')"><span>🌴</span><span class="title">Exotic Flags</span></div>
        </div>
        
        <div class="section-title">Study by Habit</div>
        <div class="grid" id="habit-grid"></div>
        <div style="text-align:center; margin-top:2rem;"><button onclick="openSyncModal()">💾 Sync/Backup Progress</button></div>
    </div>

    <div id="study-view" class="study-view">
        <button onclick="showDashboard()">← Menu</button>
        <div class="flashcard-container">
            <div class="flashcard" id="card" onclick="flipCard()">
                <div class="card-face card-front"><img id="front-photo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="card-face card-back" id="back-content">
                    <h2 id="back-sci" style="font-style:italic;"></h2>
                    <h3 id="back-common"></h3>
                    <div id="details"></div>
                </div>
            </div>
        </div>
        <div class="eval-controls" id="eval-controls">
            <button class="eval-btn" style="background:var(--danger)" onclick="gradeCard(false)">❌ Missed</button>
            <button class="eval-btn" style="background:var(--accent-green)" onclick="gradeCard(true)">✅ Knew It</button>
        </div>
    </div>

    <div id="sync-modal" class="modal"><div class="modal-content"><textarea id="sync-data" style="width:100%; height:150px;"></textarea><button onclick="loadSyncData()">Load Data</button></div></div>

    <script src="data/daily_data.js"></script>
    <script>
        let masterData = [], activeDeck = [], currentIndex = 0;
        let userStats = JSON.parse(localStorage.getItem('nativePlantStats')) || { mastery: {}, missed: [], exotic: [] };

        function initApp() {
            masterData = Object.keys(plantData).map(k => ({ scientific_name: k, ...plantData[k] }));
            buildDashboard();
            checkResume();
        }
        function buildDashboard() {
            const grid = document.getElementById('habit-grid');
            let habits = [...new Set(masterData.map(p => p.traits?.habit?.split(',')[0].trim()).filter(Boolean))];
            habits.forEach(h => grid.innerHTML += `<div class="dash-btn" onclick="startStudy('habit', '${h}')">${h}</div>`);
        }
        function startStudy(mode, param) {
            if (mode === 'smart') activeDeck = [...masterData].sort((a,b) => (userStats.mastery[a.scientific_name]||0) - (userStats.mastery[b.scientific_name]||0)).slice(0, 50);
            else if (mode === 'all') activeDeck = [...masterData];
            else if (mode === 'missed') activeDeck = masterData.filter(p => userStats.missed.includes(p.scientific_name));
            else if (mode === 'exotic') activeDeck = masterData.filter(p => userStats.exotic.includes(p.scientific_name));
            else activeDeck = masterData.filter(p => p.traits?.habit?.includes(param));
            currentIndex = 0;
            localStorage.setItem('lastSession', JSON.stringify({ mode, param, index: 0 }));
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('study-view').style.display = 'flex';
            loadCard(currentIndex);
        }
        function loadCard(index) {
            const p = activeDeck[index];
            document.getElementById('front-photo').src = p.photos[0]?.url || '';
            document.getElementById('back-sci').innerText = p.scientific_name;
            document.getElementById('back-common').innerText = p.common_name;
            const t = p.traits || {};
            document.getElementById('details').innerHTML = `Family: ${p.family}<br>Hosts: ${p.lepidoptera||0}<br>Habit: ${t.habit||'N/A'}<br>Bloom: ${t.bloom_time||'N/A'}<br>Water: ${t.water_use||'N/A'}<br>Habitat: ${t.native_habitat||'N/A'}`;
            document.getElementById('card').classList.remove('is-flipped');
            document.getElementById('eval-controls').classList.remove('visible');
        }
        function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); document.getElementById('eval-controls').classList.add('visible'); }
        function gradeCard(knewIt) {
            const p = activeDeck[currentIndex].scientific_name;
            userStats.mastery[p] = (userStats.mastery[p] || 0) + (knewIt ? 1 : -1);
            if (!knewIt && !userStats.missed.includes(p)) userStats.missed.push(p);
            else if (knewIt) userStats.missed = userStats.missed.filter(n => n !== p);
            localStorage.setItem('nativePlantStats', JSON.stringify(userStats));
            let s = JSON.parse(localStorage.getItem('lastSession'));
            s.index = ++currentIndex;
            localStorage.setItem('lastSession', JSON.stringify(s));
            currentIndex < activeDeck.length ? loadCard(currentIndex) : showDashboard();
        }
        function checkResume() { let s = localStorage.getItem('lastSession'); if(s) { document.getElementById('resume-btn').style.display = 'flex'; document.getElementById('resume-subtitle').innerText = `Card ${JSON.parse(s).index + 1}`; } }
        function resumeSession() { let s = JSON.parse(localStorage.getItem('lastSession')); startStudy(s.mode, s.param); setTimeout(() => loadCard(s.index), 100); }
        function showDashboard() { document.getElementById('study-view').style.display = 'none'; document.getElementById('dashboard-view').style.display = 'block'; }
        function openSyncModal() { document.getElementById('sync-modal').style.display = 'flex'; document.getElementById('sync-data').value = btoa(JSON.stringify(userStats)); }
        function loadSyncData() { userStats = JSON.parse(atob(document.getElementById('sync-data').value)); localStorage.setItem('nativePlantStats', JSON.stringify(userStats)); location.reload(); }
        window.onload = initApp;
    </script>
</body>
</html>
